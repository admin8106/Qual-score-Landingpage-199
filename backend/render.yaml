services:
  - type: web
    name: qualcore-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      - key: APP_ENV
        value: prod

      - key: DATABASE_URL
        sync: false

      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SEED_ENABLED
        value: "true"

      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ENABLED
        value: "true"
      - key: OPENAI_MODEL
        value: gpt-4o

      - key: INTEGRATIONS_PAYMENT_PROVIDER
        value: razorpay
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      - key: WHATSAPP_PROVIDER
        value: stub
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        sync: false

      - key: EMAIL_PROVIDER
        value: stub
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM_ADDRESS
        value: reports@qualscore.in

      - key: CRM_PROVIDER
        value: stub
      - key: CRM_ENABLED
        value: "false"
      - key: CRM_API_KEY
        sync: false
      - key: CRM_API_URL
        sync: false
      - key: CRM_WEBHOOK_URL
        sync: false
      - key: CRM_WEBHOOK_SECRET
        sync: false

      - key: CORS_ALLOWED_ORIGINS
        sync: false

      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: ENVIRONMENT_MODE
        value: LIVE
