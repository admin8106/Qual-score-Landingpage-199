version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: qualcore-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: qualcore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qualcore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_dev_data:
    driver: local
