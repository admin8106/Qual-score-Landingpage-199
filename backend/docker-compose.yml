version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# QualCore — Local Docker Compose (full stack)
#
# Usage:
#   cp .env.example .env        # fill in secrets
#   docker compose up --build   # first run (builds the image)
#   docker compose up -d        # subsequent runs
#
# App:      http://localhost:8080
# Swagger:  http://localhost:8080/swagger-ui.html
# Health:   http://localhost:8080/actuator/health
# Postgres: localhost:5432 (qualcore / postgres / postgres)
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: qualcore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qualcore
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d qualcore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qualcore-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ── Profile ──────────────────────────────────────────────────────────
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      APP_ENV: ${APP_ENV:-local}
      PORT: ${PORT:-8080}

      # ── Database ─────────────────────────────────────────────────────────
      DB_URL: jdbc:postgresql://postgres:5432/qualcore
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-2}

      # ── JWT / Admin Auth ──────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-use-a-long-random-string-min-64-chars}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      ADMIN_SEED_ENABLED: ${ADMIN_SEED_ENABLED:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@qualscore.in}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@2024!}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-QualScore Admin}
      BCRYPT_STRENGTH: ${BCRYPT_STRENGTH:-12}

      # ── CORS ─────────────────────────────────────────────────────────────
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:4173}

      # ── Payment ───────────────────────────────────────────────────────────
      INTEGRATIONS_PAYMENT_PROVIDER: ${INTEGRATIONS_PAYMENT_PROVIDER:-mock}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      PAYU_MERCHANT_KEY: ${PAYU_MERCHANT_KEY:-}
      PAYU_MERCHANT_SALT: ${PAYU_MERCHANT_SALT:-}
      PAYU_BASE_URL: ${PAYU_BASE_URL:-https://test.payu.in}

      # ── OpenAI ────────────────────────────────────────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-2000}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.2}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-60}
      OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-1}

      # ── LinkedIn / Proxycurl ──────────────────────────────────────────────
      PROXYCURL_API_KEY: ${PROXYCURL_API_KEY:-}

      # ── Email (Resend) ────────────────────────────────────────────────────
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-stub}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-reports@qualscore.in}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-QualScore}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}

      # ── WhatsApp (Meta Cloud API) ─────────────────────────────────────────
      # Note: WHATSAPP_PROVIDER=meta requires all four credentials below.
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-stub}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v19.0}

      # ── CRM ───────────────────────────────────────────────────────────────
      CRM_PROVIDER: ${CRM_PROVIDER:-stub}
      CRM_ENABLED: ${CRM_ENABLED:-true}
      CRM_WEBHOOK_URL: ${CRM_WEBHOOK_URL:-}
      CRM_WEBHOOK_SECRET: ${CRM_WEBHOOK_SECRET:-}
      CRM_API_KEY: ${CRM_API_KEY:-}
      CRM_API_URL: ${CRM_API_URL:-}
      CRM_OWNER_ID: ${CRM_OWNER_ID:-}

      # ── Slack ─────────────────────────────────────────────────────────────
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}

      # ── Calendly ─────────────────────────────────────────────────────────
      CALENDLY_API_KEY: ${CALENDLY_API_KEY:-}
      CALENDLY_EVENT_TYPE_URI: ${CALENDLY_EVENT_TYPE_URI:-}

      # ── Rate limiting ─────────────────────────────────────────────────────
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-false}
      RATE_LIMIT_PUBLIC_RPM: ${RATE_LIMIT_PUBLIC_RPM:-60}
      RATE_LIMIT_ADMIN_RPM: ${RATE_LIMIT_ADMIN_RPM:-120}

      # ── Logging ───────────────────────────────────────────────────────────
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}

    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    volumes:
      - app_logs:/app/logs

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local
