spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    out-of-order: true

app:
  environment: dev

cors:
  allowed-origins: >
    http://localhost:5173,http://localhost:3000,http://localhost:4173,http://127.0.0.1:5173

management:
  endpoint:
    health:
      show-details: always
      show-components: always

integrations:
  payment:
    provider: mock

  openai:
    enabled: false

logging:
  level:
    com.qualscore: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.flywaydb: DEBUG
